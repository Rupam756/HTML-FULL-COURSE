<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Creative Digital Surprise ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* THE ARCHITECTURE ENGINE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Smooth Premium Animated Gradient Background */
            background: linear-gradient(-45deg, #ffdee9, #b5fffc, #ffe5ec, #fff0f5);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            font-family: 'Hind Siliguri', 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Music Controller Floating Button */
        .music-ctrl {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(236, 72, 153, 0.2);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 10;
            font-weight: 600;
            color: #db2777;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .stage {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            pointer-events: none;
            z-index: 2;
        }

        .stage.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        .stage-title {
            font-size: 2.3rem;
            color: #be185d;
            font-weight: 700;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .primary-btn {
            background: linear-gradient(135deg, #f472b6, #db2777);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(219, 39, 119, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
            font-family: 'Hind Siliguri', sans-serif;
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(219, 39, 119, 0.45);
        }

        .new-magic-logo {
            font-size: 65px;
            color: #db2777;
            animation: floatLogo 2s infinite ease-in-out;
            margin-bottom: 15px;
            display: inline-block;
        }

        .spinner {
            width: 65px;
            height: 65px;
            border: 5px solid rgba(219, 39, 119, 0.1);
            border-top: 5px solid #db2777;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        .scratch-surface {
            position: relative;
            width: 280px;
            height: 280px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            border: 4px dashed #f472b6;
        }

        .cake-graphic {
            font-size: 110px;
            animation: bounce 2s infinite ease-in-out;
        }

        .knife-pointer {
            position: absolute;
            font-size: 36px;
            color: #db2777;
            pointer-events: none;
            animation: knifeMove 1.5s infinite alternate ease-in-out;
        }

        /* 9 PHOTOS STACK ARCHITECTURE */
        .photo-stack {
            position: relative;
            width: 330px;
            height: 420px;
            margin-bottom: 25px;
        }

        .photo-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fff;
            padding: 12px;
            padding-bottom: 50px;
            border-radius: 16px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.08);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1), opacity 0.6s;
            cursor: pointer;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .letter-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.06);
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-height: 65vh;
            overflow-y: auto;
        }

        .letter-text {
            color: #4b5563;
            font-size: 1.15rem;
            line-height: 1.8;
            text-align: left;
            min-height: 150px;
            font-family: 'Hind Siliguri', sans-serif;
            font-weight: 600;
        }

        .confetti-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% center; }
            100% { background-position: 0% 50%; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(3deg); } }
        @keyframes knifeMove { from { transform: translate(35px, -35px) rotate(0deg); } to { transform: translate(-35px, 35px) rotate(-25deg); } }
    </style>
</head>

        <p style="color: #6b7280; font-size: 1.1rem; margin-bottom: 25px;">হ্যাঁ, ঠিক ধরেছ, তুমিই সে! তোমার জন্য একটা ছোট্ট সারপ্রাইজ...</p>

        <button class="primary-btn" onclick="revealLetterStage()">আমার চিঠিটি পড়ো ✉️</button>
    </div>

    <div class="stage" id="stage-5">
        <div class="new-magic-logo">👑💖</div>
        <h2 class="stage-title" style="margin-bottom: 20px; font-size: 2.2rem;">হৃদয় থেকে কিছু কথা...</h2>
        <div class="letter-card">
            <div class="letter-text" id="typewriter-content"></div>
        </div>
    </div>

    <script>
        const music = document.getElementById('lofi-stream'); 
        const popSound = document.getElementById('pop-sound');
        const musicBtn = document.getElementById('music-btn');

        function unlockAudioAndProceed() {
            music.play().then(() => {
                musicBtn.innerHTML = `<i class="fa-solid fa-pause"></i> <span>Pause Music</span>`;
            }).catch(e => console.log("Audio pipeline initialized"));
            goToStage(2);
        }

        function toggleMusic() {
            if (music.paused) {
                music.play().catch(e => console.log("Blocked"));
                musicBtn.innerHTML = `<i class="fa-solid fa-pause"></i> <span>Pause Music</span>`;
            } else {
                music.pause();
                musicBtn.innerHTML = `<i class="fa-solid fa-music"></i> <span>Play Music</span>`;
            }
        }

        function goToStage(stageNum) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            document.getElementById(`stage-${stageNum}`).classList.add('active');
        }

        function sliceCake() {
            const cake = document.getElementById('cake-node');
            const knife = document.getElementById('knife-node');
            
            popSound.currentTime = 0;
            popSound.play(); 
            
            knife.style.display = 'none';
            cake.innerText = '🍰✨'; 
            
            triggerParticlesRain();
            
            setTimeout(() => {
                goToStage(4);
            }, 1300);
        }

        let maxZIndex = 9;
        function shiftCard(card) {
            popSound.currentTime = 0;
            popSound.play(); 
            
            card.style.transform = 'translateX(380px) translateY(-40px) rotate(30deg) scale(0.8)';
            card.style.opacity = '0';
            
            setTimeout(() => {
                maxZIndex--;
                card.style.zIndex = maxZIndex;
                card.style.transform = `rotate(${Math.random() * 10 - 5}deg)`;
                card.style.opacity = '1';
            }, 500);
        }

        function revealLetterStage() {
            goToStage(5);
            setTimeout(typeWriterEngine, 600);
        }

        const rawLetterString = `শুভ জন্মদিন, প্রিয় 💖\n\nআজকের এই বিশেষ দিনে পৃথিবীর সমস্ত আনন্দ, ভালোবাসা আর মিষ্টি হাসি তোমার জীবনে ধরা দিক—এটাই মন থেকে চাই। তোমার মাঝে এমন এক ஜাদুকরী ক্ষমতা আছে, যা দিয়ে তুমি চারপাশের সবকিছুকে আরও উজ্জ্বল এবং সুন্দর করে তুলতে পারো। তোমার ওই মিষ্টি হাসি আর নিষ্পাপ মনটা সত্যি খুব স্পেশাল।\n\nআশা করি তোমার আজকের দিনটি অফুরন্ত হাসি, চমৎকার সব সারপ্রাইজ আর মন ভালো করা মুহূর্ত দিয়ে ভরে উঠবে। তুমি যেমন আছ, ঠিক তেমনই থেকো—সবার মাঝে এভাবেই আনন্দ ছড়িয়ে যেও। নিজের প্রতি খেয়াল রেখো আর খুব ভালো থেকো! ✨ \n\nআজ চিঠিও লিখেছি আবার তুমি করেও বলেছি ।\n\n\t\t\t\t\ইতি 
রূপম`;
        
        let charIndex = 0;
        function typeWriterEngine() {
            const targetNode = document.getElementById('typewriter-content');
            if (charIndex < rawLetterString.length) {
                let char = rawLetterString.charAt(charIndex);
                if (char === '\n') {
                    targetNode.innerHTML += '<br>';
                } else {
                    targetNode.innerHTML += char;
                }
                charIndex++;
                setTimeout(typeWriterEngine, 45); 
            }
        }

        function triggerParticlesRain() {
            const canvas = document.getElementById('particles');
            const colors = ['#f472b6', '#ec4899', '#fbcfe8', '#ffffaa', '#67e8f9'];
            
            for(let i=0; i<65; i++) {
                const node = document.createElement('div');
                node.style.position = 'absolute';
                node.style.width = Math.random() * 10 + 6 + 'px';
                node.style.height = node.style.width;
                node.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                node.style.left = Math.random() * 100 + 'vw';
                node.style.top = '-20px';
                node.style.borderRadius = '50%';
                
                canvas.appendChild(node);
                
                node.animate([
                    { transform: 'translateY(0) scale(1)', opacity: 1 },
                    { transform: `translateY(105vh) translateX(${Math.random() * 100 - 50}px) scale(0.5)`, opacity: 0 }
                ], {
                    duration: Math.random() * 2000 + 1500,
                    iterations: 1
                }).onfinish = () => node.remove();
            }
        }
    </script>
